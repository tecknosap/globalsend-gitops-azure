name: "Dev Pipeline: Terraform + AKS + ArgoCD"

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  dev-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Debug info
      - name: Debug info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: ${{ github.environment }}"
          
      # 3️⃣ Login to Azure using OIDC
      - name: Azure Login (OIDC)
        uses: azure/login@v1.6.1
        with:
          client-id: ${{ secrets.DEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}

      # 4️⃣ Set Terraform env vars
      - name: Terraform OIDC environment variables
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.DEV_AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.DEV_AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          
      # 5️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      # 5️⃣b Setup Terragrunt with retry logic
      - name: Setup Terragrunt
        run: |
          TERRAGRUNT_VERSION="v0.55.1"
          mkdir -p bin
          
          echo "Downloading Terragrunt version $TERRAGRUNT_VERSION..."
          
          # Download with retry logic and verbose output
          for i in {1..3}; do
            echo "Attempt $i to download Terragrunt..."
            if wget -q --show-progress --timeout=30 --tries=2 -O bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/$TERRAGRUNT_VERSION/terragrunt_linux_amd64"; then
              echo "Download successful on attempt $i"
              break
            else
              if [ $i -eq 3 ]; then
                echo "Failed to download Terragrunt after 3 attempts"
                exit 1
              fi
              echo "Download failed, retrying in 5 seconds..."
              sleep 5
            fi
          done
          
          # Verify download completed
          if [ ! -f bin/terragrunt ]; then
            echo "Error: Terragrunt binary not found after download"
            exit 1
          fi
          
          # Check file size to ensure it's complete
          FILE_SIZE=$(wc -c < bin/terragrunt)
          EXPECTED_SIZE=68899859  # Approximate size in bytes
          
          if [ $FILE_SIZE -lt 60000000 ]; then
            echo "Error: Downloaded file is too small ($FILE_SIZE bytes), likely incomplete"
            exit 1
          fi
          
          chmod +x bin/terragrunt
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
          
          # Verify installation
          echo "Terragrunt installation complete:"
          terragrunt --version
        shell: bash

      # 6️⃣ Deploy infrastructure with Terragrunt
      - name: Terragrunt Apply
        working-directory: terragrunt/environments/dev/cluster
        run: terragrunt apply -auto-approve --terragrunt-non-interactive
          
      # 7️⃣ Wait for AKS cluster to be ready
      - name: Wait for AKS readiness
        run: |
          az aks wait \
            --name aks-cluster-dev \
            --resource-group rg-aks-dev \
            --created
          sleep 30
          
      # 8️⃣ Get AKS credentials
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-aks-dev \
            --name aks-cluster-dev \
            --overwrite-existing
          
      # 9️⃣ Verify AKS connection
      - name: Verify AKS connection
        run: kubectl get nodes
          
      # 🔟 Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v3

      # 1️⃣1️⃣ Install ArgoCD into AKS via Helm
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --set server.service.type=LoadBalancer \
            --wait \
            --timeout 5m
          
      # 1️⃣2️⃣ Wait for ArgoCD components
      - name: Wait for ArgoCD readiness
        run: |
          kubectl rollout status deployment/argocd-server -n argocd --timeout=180s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-server -n argocd --timeout=120s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-repo-server -n argocd --timeout=120s
          sleep 20
          
      # 1️⃣3️⃣ Create application namespace
      - name: Create app namespace
        run: |
          kubectl create namespace globalsend-site --dry-run=client -o yaml | kubectl apply -f -
          
      # 1️⃣4️⃣ Apply ArgoCD Application manifest
      - name: Deploy ArgoCD Application
        run: |
          kubectl apply -f argocd/application.yaml -n argocd
          
      # 1️⃣5️⃣ Verify application deployment
      - name: Verify Application
        run: |
          echo "📋 Application status:"
          kubectl get application -n argocd globalsend-site
          echo ""
          echo "⏳ Waiting for ArgoCD to auto-sync (60 seconds)..."
          sleep 60
          echo ""
          echo "✅ Final application status:"
          kubectl get application -n argocd globalsend-site -o wide
          echo ""
          echo "📦 Pods in globalsend-site namespace:"
          kubectl get pods -n globalsend-site || echo "No pods yet - still syncing"