name: Dev Pipeline — AKS + Terraform + ArgoCD

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  dev-deploy:
    name: Deploy to AKS (Dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # =========================================================
      # 📦 Source
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Pipeline context
        run: |
          echo "Branch      : ${{ github.ref_name }}"
          echo "Environment : ${{ github.environment }}"

      # =========================================================
      # 🔐 Security Scanning (Non-blocking)
      # =========================================================

      ## Terraform (TFSec)
      - name: TFSec scan (IaC)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform
          soft_fail: true

      ## Terraform (Checkov)
      - name: Install Checkov
        run: pip install --quiet checkov

      - name: Checkov scan (IaC)
        run: checkov -d ./terraform || true

      ## Container Image (Trivy)
      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy scan (Docker image)
        run: |
          IMAGE="your-dockerhub-username/your-image:latest"
          echo "Scanning image: $IMAGE"
          trivy image --severity HIGH,CRITICAL $IMAGE || true

      # =========================================================
      # ☁️ Azure Authentication (OIDC)
      # =========================================================
      - name: Azure login
        uses: azure/login@v1.6.1
        with:
          client-id: ${{ secrets.DEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}

      - name: Export Terraform environment variables
        run: |
          {
            echo "ARM_CLIENT_ID=${{ secrets.DEV_AZURE_CLIENT_ID }}"
            echo "ARM_TENANT_ID=${{ secrets.DEV_AZURE_TENANT_ID }}"
            echo "ARM_SUBSCRIPTION_ID=${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}"
            echo "ARM_USE_OIDC=true"
          } >> $GITHUB_ENV

      # =========================================================
      # 🏗️ Infrastructure Provisioning (Terraform + Terragrunt)
      # =========================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          TERRAGRUNT_VERSION="v0.55.1"
          echo "Installing Terragrunt ${TERRAGRUNT_VERSION}..."
          sudo wget -q -O /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/${TERRAGRUNT_VERSION}/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Apply infrastructure (Terragrunt)
        working-directory: terragrunt/environments/dev/cluster
        run: terragrunt apply -auto-approve --terragrunt-non-interactive

      # =========================================================
      # ☸️ AKS Access & Validation
      # =========================================================
      - name: Wait for AKS cluster
        run: |
          az aks wait \
            --name aks-cluster-dev \
            --resource-group rg-aks-dev \
            --created
          sleep 30

      - name: Fetch AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-aks-dev \
            --name aks-cluster-dev \
            --overwrite-existing

      - name: Validate cluster connectivity
        run: kubectl get nodes

      # =========================================================
      # 🚀 ArgoCD Installation & App Deployment
      # =========================================================
      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Install / Upgrade ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --set server.service.type=LoadBalancer \
            --wait \
            --timeout 5m

      - name: Wait for ArgoCD readiness
        run: |
          kubectl rollout status deployment/argocd-server -n argocd --timeout=180s
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=argocd-server -n argocd --timeout=120s
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=argocd-repo-server -n argocd --timeout=120s
          sleep 20

      - name: Create application namespace
        run: |
          kubectl create namespace globalsend-site \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy ArgoCD application
        run: kubectl apply -f argocd/application.yaml -n argocd

      - name: Verify deployment
        run: |
          echo "Application status:"
          kubectl get application -n argocd globalsend-site

          echo "Waiting for sync..."
          sleep 60

          echo "Final status:"
          kubectl get application -n argocd globalsend-site -o wide

          echo "Pods:"
          kubectl get pods -n globalsend-site || echo "Still syncing..."